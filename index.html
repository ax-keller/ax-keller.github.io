<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alex Keller - Projects</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f5f5f5;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .container {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 16px rgba(0, 0, 0, 0.1);
      padding: 32px;
      width: 100%;
      max-width: 640px;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 24px;
      text-align: center;
    }

    .tiles {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 16px;
    }

    a.tile {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      background: #fafafa;
      border-radius: 8px;
      text-decoration: none;
      color: #1a1a1a;
      transition: background-color 0.15s;
    }

    a.tile:hover {
      background: #f0f0f0;
    }

    a.tile:active {
      background: #e5e5e5;
    }

    .tile-icon {
      font-size: 2rem;
      margin-bottom: 8px;
    }

    .tile-title {
      font-size: 0.875rem;
      font-weight: 500;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Projects</h1>
    <div class="tiles">
      <a href="qr-gen/qr-gen.html" class="tile">
        <span class="tile-icon">⬡</span>
        <span class="tile-title">QR Code Generator</span>
      </a>
    </div>
  </div>
</body>
</html>
